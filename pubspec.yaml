name: anime_watchlist_app
description: A simple anime watchlist mobile app (Flutter + Supabase + Jikan).
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.6
  http: ^1.2.1
  provider: ^6.1.2
  flutter_dotenv: ^5.1.0
  shared_preferences: ^2.2.3
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
  fonts:
    # Zen Maru Gothic (丸ゴシック) — titles + all JP/CJK. The "soft" comes from here.
    - family: ZenMaruGothic
      fonts:
        - asset: assets/fonts/ZenMaruGothic-Regular.ttf
          weight: 400
        - asset: assets/fonts/ZenMaruGothic-Bold.ttf
          weight: 700
        - asset: assets/fonts/ZenMaruGothic-Black.ttf
          weight: 900
    # Outfit — geometric round face, numbers + english labels only.
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    # Inter kept only as a latin fallback during the transition.
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter-ExtraBold.ttf
          weight: 800
